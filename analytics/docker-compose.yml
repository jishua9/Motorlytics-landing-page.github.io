# Self-hosted Umami for motorlytics.com.au analytics.
# Run this on the homelab (not part of the site build). See README.md.
#
# Create a .env next to this file with:
#   DB_PASSWORD=<something long>
#   APP_SECRET=<output of: openssl rand -base64 32>

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:${DB_PASSWORD}@db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${APP_SECRET}
      # Serve the tracker at /p.js instead of the block-listed /script.js.
      TRACKER_SCRIPT_NAME: p
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - umami-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  umami-db:
